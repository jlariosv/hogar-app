<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="description" content="Seguimiento de cosas del hogar - Organiza y gestiona tareas domésticas">
  <meta name="keywords" content="hogar, tareas, seguimiento, organización">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nuestro Hogar">
  
  <title>Nuestro Hogar</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  
  <!-- Theme CSS -->
  <link rel="stylesheet" href="src/styles/theme.css">
  
  <!-- Global Styles -->
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --border: #e8e4df;
      --text: #1a1a1a;
      --text2: #6b6560;
      --text3: #a09a94;
      --accent: #1a1a1a;
      --green: #2d6a4f;
      --green-bg: #d8f3dc;
      --red: #9b2335;
      --red-bg: #fce4e8;
      --amber: #7d4e00;
      --amber-bg: #fff3cd;
      --blue: #1a4a7a;
      --blue-bg: #dbeafe;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
    }

    /* AUTH SCREEN */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 1000;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #auth-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .auth-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: var(--text);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .auth-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 48px;
      font-weight: 400;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .auth-input-group {
      margin-bottom: 16px;
    }

    .auth-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    .auth-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .auth-btn:active {
      opacity: 0.8;
    }

    .auth-error {
      color: var(--red);
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    .auth-error.show {
      display: block;
    }

    .auth-loading {
      display: none;
    }

    .auth-loading.show {
      display: block;
      margin-top: 8px;
    }

    /* MAIN APP CONTAINER */
    #app {
      display: none;
      height: 100%;
      flex-direction: column;
    }

    #app.visible {
      display: flex;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .header-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background-color 0.2s;
    }

    .icon-btn:active {
      background-color: var(--border);
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 32px;
      color: var(--text2);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--text3);
    }

    /* FOOTER / ACTIONS */
    .footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:active {
      opacity: 0.8;
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:active {
      background: var(--border);
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 360px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .modal-header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    .modal-body {
      margin-bottom: 24px;
    }

    .modal-footer {
      display: flex;
      gap: 8px;
    }

    /* NOTIFICATIONS */
    .toast-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 2000;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.3s ease;
      box-shadow: var(--shadow);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast-success {
      background: var(--green-bg);
      color: var(--green);
    }

    .toast-error {
      background: var(--red-bg);
      color: var(--red);
    }

    .toast-info {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .toast-warning {
      background: var(--amber-bg);
      color: var(--amber);
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .auth-card {
        padding: 24px 16px;
      }

      .modal {
        max-width: 100%;
        border-radius: var(--radius-sm);
      }

      .toast-container {
        left: 16px;
        right: 16px;
        max-width: none;
      }
    }

    /* DARK MODE */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2a2a2a;
        --text: #f7f5f2;
        --text2: #b8b3ae;
        --text3: #6b6560;
      }
    }

    /* LOADING STATE */
    .loading {
      pointer-events: none;
      opacity: 0.6;
    }

    /* UTILITY */
    .hidden {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>
<body>
  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-logo">🏠</div>
    <div class="auth-sub">Nuestro Hogar</div>
    
    <div class="auth-card">
      <div class="auth-input-group">
        <input 
          type="text" 
          id="auth-code" 
          class="auth-input" 
          placeholder="Código de acceso"
          maxlength="6"
          inputmode="numeric"
          autocomplete="off"
          aria-label="Código de acceso"
        />
      </div>
      
      <button id="auth-btn" class="auth-btn" type="button">Acceder</button>
      
      <div id="auth-error" class="auth-error" role="alert"></div>
      <div id="auth-loading" class="auth-loading" aria-live="polite">Verificando...</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <!-- HEADER -->
    <header class="header">
      <h1 class="header-title">Nuestro Hogar</h1>
      <div class="header-actions">
        <button class="icon-btn" id="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">🌙</button>
        <button class="icon-btn" id="settings-btn" title="Configuración" aria-label="Configuración">⚙️</button>
        <button class="icon-btn" id="logout-btn" title="Cerrar sesión" aria-label="Cerrar sesión">🚪</button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Sin tareas</div>
        <div class="empty-sub">Crea una nueva tarea para comenzar</div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <button class="btn btn-primary" id="add-task-btn" type="button">+ Agregar Tarea</button>
    </footer>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container" role="region" aria-label="Notificaciones" aria-live="polite"></div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content">
      <!-- Modal content injected by JavaScript -->
    </div>
  </div>

  <!-- Service Worker Registration -->
  <script>
    // Register service worker for PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado', reg))
          .catch(err => console.log('Error registrando SW:', err));
      });
    }

    // Prevent console errors in production
    if (typeof console === 'undefined') {
      window.console = {
        log: () => {},
        error: () => {},
        warn: () => {},
        info: () => {}
      };
    }
  </script>

  <!-- Main Application Module (ES6) -->
  <script type="module">
    import { App } from './src/app.js';

    // Initialize app when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        window.app = new App();
        window.app.init();
      });
    } else {
      window.app = new App();
      window.app.init();
    }

    // Handle app errors
    window.addEventListener('error', (event) => {
      console.error('App error:', event.error);
    });

    window.addEventListener('unhandledrejection', (event) => {
      console.error('Unhandled rejection:', event.reason);
    });
  </script>

  <!-- Preload critical resources -->
  <link rel="preload" href="src/app.js" as="script" type="module">
  <link rel="preload" href="src/config.js" as="script" type="module">
  <link rel="preload" href="src/styles/theme.css" as="style">
</body>
</html>
